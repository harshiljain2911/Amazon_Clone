<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#131921"/>

  <!-- Amazon "a" letterform -->
  <text
    x="50"
    y="62"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="58"
    font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="-2"
  >a</text>

  <!-- Amazon smile arrow (orange curved arrow underneath "a") -->
  <path
    d="M28 72 Q50 88 72 72"
    stroke="#FF9900"
    stroke-width="5.5"
    fill="none"
    stroke-linecap="round"
  />
  <!-- Arrowhead at end of smile -->
  <path
    d="M67 68 L72 72 L68 77"
    stroke="#FF9900"
    stroke-width="5.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>